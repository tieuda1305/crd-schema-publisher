name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: dropdown
    id: deployment-mode
    attributes:
      label: Deployment mode
      options:
        - Watch (Deployment)
        - CronJob
        - Local (extract)
        - Local (preview)
        - "N/A"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: image-tag
    attributes:
      label: Image tag or commit
      placeholder: "ghcr.io/sholdee/crd-schema-publisher:latest"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
    validations:
      required: false
