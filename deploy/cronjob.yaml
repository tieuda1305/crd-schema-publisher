---
apiVersion: v1
kind: Namespace
metadata:
  name: kubernetes-schemas
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-schemas
  namespace: kubernetes-schemas
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-schemas
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-schemas
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-schemas
subjects:
  - kind: ServiceAccount
    name: kubernetes-schemas
    namespace: kubernetes-schemas
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-credentials
  namespace: kubernetes-schemas
stringData:
  CLOUDFLARE_API_TOKEN: "<your-cloudflare-api-token>"
  CLOUDFLARE_ACCOUNT_ID: "<your-cloudflare-account-id>"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubernetes-schemas
  namespace: kubernetes-schemas
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: kubernetes-schemas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: crd-schema-publisher
              image: ghcr.io/sholdee/crd-schema-publisher:latest
              env:
                - name: CLOUDFLARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-credentials
                      key: CLOUDFLARE_API_TOKEN
                - name: CLOUDFLARE_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-credentials
                      key: CLOUDFLARE_ACCOUNT_ID
                - name: CF_PAGES_PROJECT
                  value: kubernetes-schemas
                - name: OUTPUT_DIR
                  value: /output
              resources:
                requests:
                  cpu: 50m
                  memory: 1Gi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: output
                  mountPath: /output
          volumes:
            - name: output
              emptyDir: {}
