{{- include "crd-schema-publisher.validateNetworkPolicy" . -}}
{{- $hasBaseIngress := eq .Values.mode "controller" -}}
{{- $hasExtraIngress := not (empty .Values.networkPolicy.extraIngress) -}}
{{- $hasIngress := or $hasBaseIngress $hasExtraIngress -}}
{{- $hasEgress := not (empty .Values.networkPolicy.extraEgress) -}}
{{- if and .Values.networkPolicy.enabled (or $hasIngress $hasEgress) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crd-schema-publisher.fullname" . }}
  labels:
    {{- include "crd-schema-publisher.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crd-schema-publisher.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if $hasIngress }}
    - Ingress
    {{- end }}
    {{- if $hasEgress }}
    - Egress
    {{- end }}
  {{- if $hasIngress }}
  ingress:
    {{- if $hasBaseIngress }}
    # Metrics scraping and helm test hook
    - ports:
        - port: {{ .Values.config.healthPort }}
          protocol: TCP
        {{- if .Values.serve.enabled }}
        - port: {{ .Values.serve.port }}
          protocol: TCP
        {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  {{- if $hasEgress }}
  egress:
    {{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
  {{- end }}
{{- end }}
