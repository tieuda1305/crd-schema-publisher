---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crd-schema-publisher-leader-election
  namespace: crd-schema-publisher
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crd-schema-publisher-leader-election
  namespace: crd-schema-publisher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crd-schema-publisher-leader-election
subjects:
  - kind: ServiceAccount
    name: crd-schema-publisher
    namespace: crd-schema-publisher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crd-schema-publisher
  namespace: crd-schema-publisher
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: crd-schema-publisher
  template:
    metadata:
      labels:
        app: crd-schema-publisher
    spec:
      serviceAccountName: crd-schema-publisher
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crd-schema-publisher
          image: ghcr.io/sholdee/crd-schema-publisher:latest
          args:
            - watch
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: crd-schema-publisher-cloudflare
                  key: CLOUDFLARE_API_TOKEN
                  optional: true
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: crd-schema-publisher-cloudflare
                  key: CLOUDFLARE_ACCOUNT_ID
                  optional: true
            - name: CF_PAGES_PROJECT
              value: kubernetes-schemas
            - name: OUTPUT_DIR
              value: /output
            # Optional schema filters. Values are comma-separated and case-insensitive.
            # - name: SCHEMA_FILTER_GROUP
            #   value: cert-manager.io
            # - name: SCHEMA_FILTER_KIND
            #   value: Certificate,Issuer
            # - name: SCHEMA_FILTER_VERSION
            #   value: v1
            - name: DEBOUNCE_SECONDS
              value: "15"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: output
              mountPath: /output
      volumes:
        - name: output
          emptyDir: {}
