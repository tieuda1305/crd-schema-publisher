---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crd-schema-publisher
  namespace: crd-schema-publisher
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: crd-schema-publisher
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: crd-schema-publisher
              image: ghcr.io/sholdee/crd-schema-publisher:latest
              env:
                - name: CLOUDFLARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: crd-schema-publisher-cloudflare
                      key: CLOUDFLARE_API_TOKEN
                      optional: true
                - name: CLOUDFLARE_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: crd-schema-publisher-cloudflare
                      key: CLOUDFLARE_ACCOUNT_ID
                      optional: true
                - name: CF_PAGES_PROJECT
                  value: kubernetes-schemas
                - name: OUTPUT_DIR
                  value: /output
                # Optional schema filters. Values are comma-separated and case-insensitive.
                # - name: SCHEMA_FILTER_GROUP
                #   value: cert-manager.io
                # - name: SCHEMA_FILTER_KIND
                #   value: Certificate,Issuer
                # - name: SCHEMA_FILTER_VERSION
                #   value: v1
              resources:
                requests:
                  cpu: 50m
                  memory: 1Gi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: output
                  mountPath: /output
          volumes:
            - name: output
              # Without Cloudflare credentials, extract-only output on emptyDir
              # is discarded when the Job pod exits.
              emptyDir: {}
