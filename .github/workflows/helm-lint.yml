---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Helm Lint

on:
  workflow_call:

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint charts/crd-schema-publisher --set existingSecret.name=test

      - name: Template (controller mode)
        run: helm template test charts/crd-schema-publisher --set existingSecret.name=test

      - name: Template (cronjob mode)
        run: helm template test charts/crd-schema-publisher --set mode=cronjob

      - name: Template (cronjob mode with Cloudflare)
        run: helm template test charts/crd-schema-publisher --set mode=cronjob --set existingSecret.name=test

      - name: Template (all features)
        run: |
          helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set metrics.podMonitor.enabled=true \
            --set metrics.prometheusRule.enabled=true \
            --set grafana.dashboard.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set podDisruptionBudget.minAvailable=1 \
            --set networkPolicy.enabled=true \
            --set replicaCount=3 \
            --set podAntiAffinityPreset=soft \
            --set persistence.enabled=true

      - name: Verify mode isolation
        run: |
          # Cronjob mode must not produce controller-only resources
          ROLE_COUNT=$(helm template test charts/crd-schema-publisher --set mode=cronjob | grep -c "^kind: Role$" || true)
          if [[ "${ROLE_COUNT}" -ne 0 ]]; then
            echo "ERROR: cronjob mode should not produce Role resources"
            exit 1
          fi

          # Controller mode must not produce CronJob
          CRON_COUNT=$(helm template test charts/crd-schema-publisher --set existingSecret.name=test | grep -c "^kind: CronJob$" || true)
          if [[ "${CRON_COUNT}" -ne 0 ]]; then
            echo "ERROR: controller mode should not produce CronJob resources"
            exit 1
          fi

      - name: Verify schema validation
        run: |
          helm template test charts/crd-schema-publisher > /dev/null
          echo "Schema accepts no secret (extract-only mode)"

          if helm template test charts/crd-schema-publisher --set existingSecret.name=s --set externalSecret.enabled=true 2>/dev/null; then
            echo "ERROR: schema should reject both secret options set simultaneously"
            exit 1
          fi
          echo "Schema correctly enforces mutual exclusivity"

          if helm template test charts/crd-schema-publisher --set existingSecret.name=s --set networkPolicy.enabled=true --set ciliumNetworkPolicy.enabled=true 2>/dev/null; then
            echo "ERROR: should reject both networkPolicy and ciliumNetworkPolicy enabled"
            exit 1
          fi
          echo "Network policy mutual exclusivity enforced"

      - name: Verify optional Cloudflare env vars
        run: |
          CRON_EXTRACT_ONLY=$(helm template test charts/crd-schema-publisher --set mode=cronjob)
          if grep -q "CLOUDFLARE_" <<< "${CRON_EXTRACT_ONLY}" || grep -q "CF_PAGES_PROJECT" <<< "${CRON_EXTRACT_ONLY}"; then
            echo "ERROR: cronjob extract-only mode should not render Cloudflare env vars"
            exit 1
          fi
          echo "CronJob extract-only mode omits Cloudflare env vars"

          CRON_WITH_SECRET=$(helm template test charts/crd-schema-publisher --set mode=cronjob --set existingSecret.name=test)
          if ! grep -q "CLOUDFLARE_API_TOKEN" <<< "${CRON_WITH_SECRET}" || ! grep -q "CLOUDFLARE_ACCOUNT_ID" <<< "${CRON_WITH_SECRET}" || ! grep -q "CF_PAGES_PROJECT" <<< "${CRON_WITH_SECRET}"; then
            echo "ERROR: cronjob Cloudflare mode should render Cloudflare env vars"
            exit 1
          fi
          echo "CronJob Cloudflare mode renders Cloudflare env vars"

      - name: Verify cronjob extract-only emptyDir warning
        run: |
          WARNING_TEXT="WARNING: CronJob extract-only mode is using emptyDir output"

          CRON_EXTRACT_ONLY_NOTES=$(helm install --dry-run --debug test charts/crd-schema-publisher --set mode=cronjob 2>/dev/null)
          if ! grep -q "${WARNING_TEXT}" <<< "${CRON_EXTRACT_ONLY_NOTES}"; then
            echo "ERROR: cronjob extract-only emptyDir mode should warn that output is discarded"
            exit 1
          fi
          echo "CronJob extract-only emptyDir mode warns about discarded output"

          CRON_WITH_SECRET_NOTES=$(helm install --dry-run --debug test charts/crd-schema-publisher --set mode=cronjob --set existingSecret.name=test 2>/dev/null)
          if grep -q "${WARNING_TEXT}" <<< "${CRON_WITH_SECRET_NOTES}"; then
            echo "ERROR: cronjob Cloudflare mode should not show emptyDir extract-only warning"
            exit 1
          fi
          echo "CronJob Cloudflare mode omits extract-only emptyDir warning"

          CRON_WITH_PERSISTENCE_NOTES=$(helm install --dry-run --debug test charts/crd-schema-publisher --set mode=cronjob --set persistence.enabled=true 2>/dev/null)
          if grep -q "${WARNING_TEXT}" <<< "${CRON_WITH_PERSISTENCE_NOTES}"; then
            echo "ERROR: cronjob persistent extract-only mode should not show emptyDir warning"
            exit 1
          fi
          echo "CronJob persistent extract-only mode omits emptyDir warning"

          CRON_WITH_BACKEND_NOTES=$(helm install --dry-run --debug test charts/crd-schema-publisher \
            --set mode=cronjob \
            --set 'extraContainers[0].name=backend' \
            --set 'extraContainers[0].image=busybox' \
            2>/dev/null)
          if grep -q "${WARNING_TEXT}" <<< "${CRON_WITH_BACKEND_NOTES}"; then
            echo "ERROR: cronjob backend extract-only mode should not show emptyDir warning"
            exit 1
          fi
          echo "CronJob backend extract-only mode omits emptyDir warning"

      - name: Verify dashboard embedding
        run: |
          DASHBOARD=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set grafana.dashboard.enabled=true \
            | yq 'select(.kind == "ConfigMap") | .data["crd-schema-publisher.json"]')
          if [[ -z "${DASHBOARD}" ]]; then
            echo "ERROR: dashboard ConfigMap data is empty"
            exit 1
          fi
          echo "${DASHBOARD}" | python3 -m json.tool > /dev/null
          echo "Dashboard JSON embedded and valid"

      - name: Verify built-in site server rendering
        run: |
          SERVE_RENDER=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set serve.enabled=true)

          SITE_ENV=$(yq 'select(.kind == "Deployment") | .spec.template.spec.containers[] | select(.name == "crd-schema-publisher") | .env[] | select(.name == "SERVE_SITE") | .value' <<< "${SERVE_RENDER}")
          if [[ "${SITE_ENV}" != "true" ]]; then
            echo "ERROR: serve.enabled should render SERVE_SITE=true"
            exit 1
          fi

          ACCESS_LOG_ENV=$(yq 'select(.kind == "Deployment") | .spec.template.spec.containers[] | select(.name == "crd-schema-publisher") | .env[] | select(.name == "SERVE_ACCESS_LOG") | .value' <<< "${SERVE_RENDER}")
          if [[ "${ACCESS_LOG_ENV}" != "false" ]]; then
            echo "ERROR: serve.enabled should render SERVE_ACCESS_LOG=false by default"
            exit 1
          fi

          ACCESS_LOG_RENDER=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set serve.enabled=true \
            --set serve.accessLog.enabled=true)
          ACCESS_LOG_ENABLED=$(yq 'select(.kind == "Deployment") | .spec.template.spec.containers[] | select(.name == "crd-schema-publisher") | .env[] | select(.name == "SERVE_ACCESS_LOG") | .value' <<< "${ACCESS_LOG_RENDER}")
          if [[ "${ACCESS_LOG_ENABLED}" != "true" ]]; then
            echo "ERROR: serve.accessLog.enabled should render SERVE_ACCESS_LOG=true"
            exit 1
          fi

          SITE_PORT=$(yq 'select(.kind == "Deployment") | .spec.template.spec.containers[] | select(.name == "crd-schema-publisher") | .ports[] | select(.name == "site") | .containerPort' <<< "${SERVE_RENDER}")
          if [[ "${SITE_PORT}" != "8081" ]]; then
            echo "ERROR: serve.enabled should render site container port 8081"
            exit 1
          fi

          STRATEGY_TYPE=$(yq 'select(.kind == "Deployment") | .spec.strategy.type' <<< "${SERVE_RENDER}")
          if [[ "${STRATEGY_TYPE}" != "Recreate" ]]; then
            echo "ERROR: serve.enabled should force Recreate deployment strategy"
            exit 1
          fi

          SERVICE_PORT=$(yq 'select(.kind == "Service") | .spec.ports[] | select(.name == "site") | .port' <<< "${SERVE_RENDER}")
          if [[ "${SERVICE_PORT}" != "8081" ]]; then
            echo "ERROR: serve.enabled should render site Service port 8081"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set mode=cronjob --set serve.enabled=true 2>/dev/null; then
            echo "ERROR: serve.enabled should be rejected in cronjob mode"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set serve.enabled=true --set replicaCount=2 2>/dev/null; then
            echo "ERROR: serve.enabled should require replicaCount=1"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set serve.enabled=true --set serve.port=8080 --set config.healthPort=8080 2>/dev/null; then
            echo "ERROR: serve.port should not be allowed to equal config.healthPort"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set serve.enabled=true --set serve.port=80 2>/dev/null; then
            echo "ERROR: serve.port should reject privileged ports"
            exit 1
          fi

          NETWORK_POLICY_SITE_PORT=$(helm template test charts/crd-schema-publisher \
            --set serve.enabled=true \
            --set networkPolicy.enabled=true \
            | yq 'select(.kind == "NetworkPolicy") | .spec.ingress[].ports[]? | select(.port == 8081) | .port')
          if [[ "${NETWORK_POLICY_SITE_PORT}" != "8081" ]]; then
            echo "ERROR: networkPolicy should allow the built-in site port when serve.enabled=true"
            exit 1
          fi

          CILIUM_POLICY_SITE_PORT=$(helm template test charts/crd-schema-publisher \
            --set serve.enabled=true \
            --set ciliumNetworkPolicy.enabled=true \
            | yq 'select(.kind == "CiliumNetworkPolicy") | .spec.ingress[].toPorts[].ports[]? | select(.port == "8081") | .port')
          if [[ "${CILIUM_POLICY_SITE_PORT}" != "8081" ]]; then
            echo "ERROR: ciliumNetworkPolicy should allow the built-in site port when serve.enabled=true"
            exit 1
          fi

          HTTP_ROUTE_RENDER=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set serve.enabled=true \
            --set serve.httpRoute.enabled=true \
            --set 'serve.httpRoute.parentRefs[0].name=envoy-gateway' \
            --set 'serve.httpRoute.parentRefs[0].namespace=gateway' \
            --set 'serve.httpRoute.parentRefs[0].sectionName=https' \
            --set-string 'serve.httpRoute.hostnames[0]=kube-schemas-test.mgmt.sholdee.net' \
            --set 'serve.httpRoute.filters[0].type=RequestHeaderModifier' \
            --set 'serve.httpRoute.filters[0].requestHeaderModifier.add[0].name=X-Test' \
            --set-string 'serve.httpRoute.filters[0].requestHeaderModifier.add[0].value=e2e')

          HTTP_ROUTE_NAME=$(yq 'select(.kind == "HTTPRoute") | .metadata.name' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_NAME}" != "test-crd-schema-publisher" ]]; then
            echo "ERROR: serve.httpRoute.enabled should render an HTTPRoute named after the release"
            exit 1
          fi

          HTTP_ROUTE_PARENT=$(yq 'select(.kind == "HTTPRoute") | .spec.parentRefs[0].name' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_PARENT}" != "envoy-gateway" ]]; then
            echo "ERROR: HTTPRoute should render configured parentRefs"
            exit 1
          fi

          HTTP_ROUTE_HOSTNAME=$(yq 'select(.kind == "HTTPRoute") | .spec.hostnames[0]' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_HOSTNAME}" != "kube-schemas-test.mgmt.sholdee.net" ]]; then
            echo "ERROR: HTTPRoute should render configured hostnames"
            exit 1
          fi

          HTTP_ROUTE_MATCH_PATH=$(yq 'select(.kind == "HTTPRoute") | .spec.rules[0].matches[0].path.value' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_MATCH_PATH}" != "/" ]]; then
            echo "ERROR: HTTPRoute should default to a / PathPrefix match"
            exit 1
          fi

          HTTP_ROUTE_BACKEND_PORT=$(yq 'select(.kind == "HTTPRoute") | .spec.rules[0].backendRefs[0].port' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_BACKEND_PORT}" != "8081" ]]; then
            echo "ERROR: HTTPRoute should route to the built-in site Service port"
            exit 1
          fi

          HTTP_ROUTE_FILTER=$(yq 'select(.kind == "HTTPRoute") | .spec.rules[0].filters[0].type' <<< "${HTTP_ROUTE_RENDER}")
          if [[ "${HTTP_ROUTE_FILTER}" != "RequestHeaderModifier" ]]; then
            echo "ERROR: HTTPRoute should render configured filters"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set serve.httpRoute.enabled=true --set 'serve.httpRoute.parentRefs[0].name=envoy-gateway' 2>/dev/null; then
            echo "ERROR: serve.httpRoute.enabled should require serve.enabled=true"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher --set serve.enabled=true --set serve.httpRoute.enabled=true 2>/dev/null; then
            echo "ERROR: serve.httpRoute.enabled should require at least one parentRef"
            exit 1
          fi

      - name: Verify Grafana Operator dashboard rendering
        run: |
          OPERATOR_RENDER=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set grafana.dashboard.operator.enabled=true \
            --set-string grafana.dashboard.operator.instanceSelector.matchLabels.dashboards=grafana \
            --set-string 'grafana.dashboard.operator.datasources[0].inputName=DS_PROMETHEUS' \
            --set-string 'grafana.dashboard.operator.datasources[0].datasourceName=VictoriaMetrics')

          if ! grep -q "^kind: GrafanaDashboard$" <<< "${OPERATOR_RENDER}"; then
            echo "ERROR: Grafana Operator mode should render a GrafanaDashboard"
            exit 1
          fi

          DASHBOARD_REF=$(yq 'select(.kind == "GrafanaDashboard") | .spec.configMapRef.name' <<< "${OPERATOR_RENDER}")
          if [[ "${DASHBOARD_REF}" != "test-crd-schema-publisher-dashboard" ]]; then
            echo "ERROR: GrafanaDashboard should reference the embedded dashboard ConfigMap"
            exit 1
          fi

          DASHBOARD_KEY=$(yq 'select(.kind == "GrafanaDashboard") | .spec.configMapRef.key' <<< "${OPERATOR_RENDER}")
          if [[ "${DASHBOARD_KEY}" != "crd-schema-publisher.json" ]]; then
            echo "ERROR: GrafanaDashboard should reference crd-schema-publisher.json"
            exit 1
          fi

          CROSS_NAMESPACE=$(yq 'select(.kind == "GrafanaDashboard") | .spec.allowCrossNamespaceImport' <<< "${OPERATOR_RENDER}")
          if [[ "${CROSS_NAMESPACE}" != "true" ]]; then
            echo "ERROR: GrafanaDashboard should allow cross-namespace import by default"
            exit 1
          fi

          DATASOURCE_INPUT=$(yq 'select(.kind == "GrafanaDashboard") | .spec.datasources[0].inputName' <<< "${OPERATOR_RENDER}")
          if [[ "${DATASOURCE_INPUT}" != "DS_PROMETHEUS" ]]; then
            echo "ERROR: GrafanaDashboard should include the configured datasource input mapping"
            exit 1
          fi

          DATASOURCE_NAME=$(yq 'select(.kind == "GrafanaDashboard") | .spec.datasources[0].datasourceName' <<< "${OPERATOR_RENDER}")
          if [[ "${DATASOURCE_NAME}" != "VictoriaMetrics" ]]; then
            echo "ERROR: GrafanaDashboard should include the configured datasource name mapping"
            exit 1
          fi

          CM_MANAGER=$(yq 'select(.kind == "ConfigMap" and .metadata.name == "test-crd-schema-publisher-dashboard") | .metadata.labels."app.kubernetes.io/managed-by"' <<< "${OPERATOR_RENDER}")
          if [[ "${CM_MANAGER}" != "grafana-operator" ]]; then
            echo "ERROR: operator dashboard ConfigMap should use the Grafana Operator cache label"
            exit 1
          fi

      - name: Verify Grafana dashboard option validation
        run: |
          if helm template test charts/crd-schema-publisher \
            --set grafana.dashboard.enabled=true \
            --set grafana.dashboard.operator.enabled=true \
            2>/dev/null; then
            echo "ERROR: sidecar and operator dashboard modes should be mutually exclusive"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher \
            --set grafana.dashboard.operator.folderRef=folder \
            --set grafana.dashboard.operator.folderUID=folder-uid \
            2>/dev/null; then
            echo "ERROR: folderRef and folderUID should be mutually exclusive"
            exit 1
          fi

          if helm template test charts/crd-schema-publisher \
            --set grafana.dashboard.operator.enabled=true \
            --set grafana.dashboard.operator.instanceSelector.mathLabels.dashboards=grafana \
            2>/dev/null; then
            echo "ERROR: invalid instanceSelector keys should be rejected by the values schema"
            exit 1
          fi

      - name: Verify existingClaim suppresses PVC creation
        run: |
          PVC_COUNT=$(helm template test charts/crd-schema-publisher \
            --set existingSecret.name=test \
            --set persistence.enabled=true \
            --set persistence.existingClaim=my-pvc \
            | grep -c "^kind: PersistentVolumeClaim$" || true)
          if [[ "${PVC_COUNT}" -ne 0 ]]; then
            echo "ERROR: existingClaim should suppress PVC creation"
            exit 1
          fi
          echo "existingClaim correctly suppresses PVC creation"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Validate manifests with kubeconform
        run: |
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0
          SCHEMA_ARGS=(
            -strict
            -ignore-missing-schemas
            -schema-location default
            -schema-location 'https://kube-schemas.shold.io/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          )

          echo "Validating controller mode (including CRD-backed resources)..."
          helm template test charts/crd-schema-publisher \
            --set externalSecret.enabled=true \
            --set externalSecret.secretStoreRef.name=test \
            --set ciliumNetworkPolicy.enabled=true \
            --set serve.enabled=true \
            --set serve.httpRoute.enabled=true \
            --set 'serve.httpRoute.parentRefs[0].name=envoy-gateway' \
            --set 'serve.httpRoute.parentRefs[0].namespace=gateway' \
            --set-string 'serve.httpRoute.hostnames[0]=kube-schemas-test.mgmt.sholdee.net' \
            --set metrics.podMonitor.enabled=true \
            --set metrics.prometheusRule.enabled=true \
            --set grafana.dashboard.operator.enabled=true \
            --set-string 'grafana.dashboard.operator.datasources[0].inputName=DS_PROMETHEUS' \
            --set-string 'grafana.dashboard.operator.datasources[0].datasourceName=VictoriaMetrics' \
            | kubeconform "${SCHEMA_ARGS[@]}"

          echo "Validating cronjob mode..."
          helm template test charts/crd-schema-publisher \
            --set mode=cronjob \
            | kubeconform "${SCHEMA_ARGS[@]}"
