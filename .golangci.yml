version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - prealloc
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 20
    nolintlint:
      require-explanation: true
      require-specific: true
    errcheck:
      check-type-assertions: false
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: '_test\.go'
        linters:
          - gocyclo
          - errcheck
