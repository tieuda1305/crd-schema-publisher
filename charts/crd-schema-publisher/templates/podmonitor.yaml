{{- if and .Values.metrics.podMonitor.enabled (eq .Values.mode "controller") -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "crd-schema-publisher.fullname" . }}
  labels:
    {{- include "crd-schema-publisher.labels" . | nindent 4 }}
    {{- with .Values.metrics.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "crd-schema-publisher.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: health
      interval: {{ .Values.metrics.podMonitor.interval }}
      path: /metrics
{{- end }}
