# -- Deployment mode: "controller" (Deployment with leader election) or "cronjob" (CronJob)
mode: controller

# -- Number of replicas (controller mode only; leader election handles safety)
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/sholdee/crd-schema-publisher
  # -- Image tag (defaults to appVersion from Chart.yaml)
  tag: ""
  # -- Image digest (takes precedence over tag when set)
  digest: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Application configuration
# ---------------------------------------------------------------------------
config:
  # -- Cloudflare Pages project name
  cfPagesProject: kubernetes-schemas
  # -- Schema output directory inside the container
  outputDir: /output
  # -- Seconds to wait after the last CRD event before publishing (controller only)
  debounceSeconds: "15"
  # -- Health/metrics server port (controller only)
  healthPort: 8080
  # -- Leader election lease name (controller only)
  leaseName: crd-schema-publisher
  # -- Set to "true" to skip HTML schema page rendering
  skipRender: ""
  # -- Directory for opt-in heap profiles and phase memory logs
  profileDir: ""
  # -- Override Cloudflare upload bucket size in bytes. Empty uses the app default (40 MiB).
  uploadBucketSizeBytes: ""
  # -- Override concurrent Cloudflare upload buckets. Empty uses the app default (3).
  uploadConcurrency: ""
  # -- URL path prefix for subpath deployments (e.g., /iac for GitHub Pages at user.github.io/iac/)
  basePath: ""
  # -- Optional schema filters. Values are comma-separated and case-insensitive.
  filter:
    # -- Filter by CRD kind, e.g. Certificate,Issuer
    kind: ""
    # -- Filter by API group, e.g. cert-manager.io
    group: ""
    # -- Filter by API version, e.g. v1,v1beta1
    version: ""

# ---------------------------------------------------------------------------
# Secrets — optional; configure at most one of the two options below
# Omit both options to run in extract-only mode without Cloudflare upload.
# Precedence: existingSecret > externalSecret
# ---------------------------------------------------------------------------

# Option 1: Reference a pre-existing Secret
existingSecret:
  # -- Name of an existing Secret containing CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
  name: ""

# Option 2: Create an ExternalSecret CR (requires External Secrets Operator)
externalSecret:
  # -- Create an ExternalSecret resource
  enabled: false
  # -- SecretStore or ClusterSecretStore reference
  secretStoreRef:
    name: ""
    kind: SecretStore
  # -- Refresh interval for the external secret
  refreshInterval: 1h
  # -- Remote key mappings
  data:
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: crd-schema-publisher-cloudflare
        property: api-token
    - secretKey: CLOUDFLARE_ACCOUNT_ID
      remoteRef:
        key: crd-schema-publisher-cloudflare
        property: account-id

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Automount the service account token
  automount: true
  # -- Additional annotations for the ServiceAccount
  annotations: {}
  # -- Override the ServiceAccount name
  name: ""

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  # -- Create ClusterRole/ClusterRoleBinding for CRD read access
  create: true

# ---------------------------------------------------------------------------
# CronJob settings (only used when mode=cronjob)
# ---------------------------------------------------------------------------
cronjob:
  # -- Cron schedule expression
  schedule: "0 3 * * *"
  # -- Concurrency policy for the CronJob
  concurrencyPolicy: Forbid
  # -- Number of successful job completions to retain
  successfulJobsHistoryLimit: 1
  # -- Number of failed job completions to retain
  failedJobsHistoryLimit: 3
  # -- Maximum runtime for each job in seconds
  activeDeadlineSeconds: 1800
  # -- Restart policy for job pods
  restartPolicy: OnFailure

# ---------------------------------------------------------------------------
# Deployment settings (only used when mode=controller)
# ---------------------------------------------------------------------------

# -- Deployment update strategy
strategy:
  type: RollingUpdate

# ---------------------------------------------------------------------------
# Pod and container configuration
# ---------------------------------------------------------------------------

# -- Container resource requests and limits
resources:
  requests:
    cpu: 50m
    memory: 500Mi
  limits:
    cpu: 500m
    memory: 500Mi

# -- Pod security context (applied to the pod spec)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Liveness probe configuration (controller mode only)
livenessProbe:
  httpGet:
    path: /healthz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe configuration (controller mode only)
readinessProbe:
  httpGet:
    path: /readyz
    port: health
  initialDelaySeconds: 3
  periodSeconds: 5

# ---------------------------------------------------------------------------
# Built-in static site server
# ---------------------------------------------------------------------------
serve:
  # -- Serve OUTPUT_DIR/current from the main controller container
  enabled: false
  # -- Non-privileged static site server port
  port: 8081
  accessLog:
    # -- Log each request served by the built-in static site server
    enabled: false
  # -- Gateway API HTTPRoute for the built-in static site server
  httpRoute:
    # -- Create an HTTPRoute for the built-in static site server
    enabled: false
    # -- Additional labels for the HTTPRoute
    labels: {}
    # -- Additional annotations for the HTTPRoute
    annotations: {}
    # -- Gateway parentRefs. Required when serve.httpRoute.enabled=true.
    parentRefs: []
    #  - name: envoy-gateway
    #    namespace: gateway
    #    sectionName: https
    # -- Hostnames for the HTTPRoute
    hostnames: []
    #  - kube-schemas.example.com
    # -- HTTPRoute matches for the site rule
    matches:
      - path:
          type: PathPrefix
          value: /
    # -- HTTPRoute filters for the site rule
    filters: []

# -- Annotations added to the Deployment or CronJob metadata (e.g. reloader.stakater.com/auto)
annotations: {}

# -- Annotations added to the pod template metadata
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

# -- Node selector constraints
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules (controller mode only; overrides podAntiAffinityPreset when set)
affinity: {}

# -- Topology spread constraints (controller mode only)
topologySpreadConstraints: []

# -- Pod anti-affinity preset: "soft", "hard", or "" (disabled; controller mode only)
# Only applied when affinity is empty
podAntiAffinityPreset: ""

# ---------------------------------------------------------------------------
# Pod disruption budget (controller mode only)
# ---------------------------------------------------------------------------
podDisruptionBudget:
  # -- Create a PodDisruptionBudget
  enabled: false
  # -- Minimum number of available pods
  # minAvailable: 1
  # -- Maximum number of unavailable pods
  # maxUnavailable: 1

# -- Priority class name for pods
priorityClassName: ""

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
metrics:
  podMonitor:
    # -- Create a PodMonitor for Prometheus Operator
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Additional labels for the PodMonitor
    labels: {}

  prometheusRule:
    # -- Create PrometheusRule alerts
    enabled: false
    # -- Additional labels for the PrometheusRule
    labels: {}
    # -- Alert thresholds
    rules:
      # -- Watchdog stale threshold in seconds
      watchdogStaleSeconds: 120
      # -- Duration before watchdog stale alert fires
      watchdogStaleFor: 5m
      # -- No successful publish threshold in seconds (0 = disabled)
      noPublishSeconds: 0
      # -- Duration before no-publish alert fires
      noPublishFor: 1h
      # -- Error spike threshold (errors per hour)
      errorSpikeThreshold: 5
      # -- Duration before error spike alert fires
      errorSpikeFor: 15m

# ---------------------------------------------------------------------------
# Grafana dashboard
# ---------------------------------------------------------------------------
grafana:
  dashboard:
    # -- Install the Grafana dashboard as a ConfigMap for sidecar discovery
    enabled: false
    # -- Label key for Grafana sidecar discovery
    label: grafana_dashboard
    # -- Label value for Grafana sidecar discovery
    labelValue: "1"
    # -- Folder annotation for the Grafana sidecar
    folder: ""
    operator:
      # -- Install the Grafana dashboard as a Grafana Operator GrafanaDashboard
      enabled: false
      # -- Grafana Operator instance selector used by the GrafanaDashboard. When empty, defaultInstanceSelector is used.
      instanceSelector: {}
      # -- Render the fallback dashboards=grafana selector when instanceSelector has no matchLabels or matchExpressions
      defaultInstanceSelector:
        enabled: true
      # -- Grafana Operator dashboard resync period
      resyncPeriod: 10m
      # -- Grafana folder title for dashboard placement
      folder: ""
      # -- GrafanaFolder resource name for dashboard placement
      folderRef: ""
      # -- Grafana folder UID for dashboard placement
      folderUID: ""
      # -- Allow the operator to match Grafana instances outside this namespace
      allowCrossNamespaceImport: true
      # -- Grafana Operator datasource mappings for dashboard template inputs
      datasources: []
      #  - inputName: DS_PROMETHEUS
      #    datasourceName: Prometheus
      # -- Additional labels for the GrafanaDashboard resource
      labels: {}
      # -- Additional annotations for the GrafanaDashboard resource
      annotations: {}

# ---------------------------------------------------------------------------
# Network policies
# ---------------------------------------------------------------------------

# -- Native Kubernetes NetworkPolicy
networkPolicy:
  # -- Create a NetworkPolicy
  enabled: false
  # -- Egress rules (no built-in egress; add rules here if needed)
  extraEgress: []
  # -- Extra ingress rules appended to the built-in health port rule (controller mode only)
  extraIngress: []

# -- Cilium network policy (mutually exclusive with networkPolicy)
ciliumNetworkPolicy:
  # -- Create a CiliumNetworkPolicy
  enabled: false
  # -- Egress rules (no built-in egress; add rules here if needed)
  extraEgress: []
  # -- Extra ingress rules appended to the built-in health port rule (controller mode only)
  extraIngress: []

# ---------------------------------------------------------------------------
# Persistence (output directory volume)
# ---------------------------------------------------------------------------
persistence:
  # -- Use a PersistentVolumeClaim for the output directory instead of emptyDir.
  # Recommended for CronJob extract-only mode when no upload backend is configured.
  enabled: false
  # -- Use an existing PVC (skips PVC creation when set)
  existingClaim: ""
  # -- Storage class ("" = cluster default, "-" = no dynamic provisioning)
  storageClass: ""
  # -- Access modes for the PVC
  accessModes:
    - ReadWriteOnce
  # -- Storage size
  size: 1Gi
  # -- Additional annotations on the PVC
  annotations: {}
  # -- Additional labels on the PVC
  labels: {}

# ---------------------------------------------------------------------------
# Extra pod customization
# ---------------------------------------------------------------------------

# -- Additional volumes to add to pods (supports Go templating)
extraVolumes: []

# -- Additional volume mounts to add to the main container (supports Go templating)
extraVolumeMounts: []

# -- Additional containers to add to pods (supports Go templating)
extraContainers: []

# ---------------------------------------------------------------------------
# Extra objects
# ---------------------------------------------------------------------------

# -- Additional Kubernetes objects to create (supports Go templating)
extraObjects: []
#  - apiVersion: v1
#    kind: ConfigMap
#    metadata:
#      name: '{{ include "crd-schema-publisher.fullname" . }}-extra'
#    data:
#      key: value
